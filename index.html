<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meu Dicionário Pessoal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f4ef; --surface: #ffffff; --surface2: #f0ece4;
    --border: #e2ddd4; --text: #1a1714; --text2: #6b6560; --text3: #a09a93;
    --accent: #2d5a3d; --accent-light: #e8f0ea;
    --blue: #1e3a5f; --blue-light: #e6edf5;
    --purple: #4a2d6b; --purple-light: #f0ebf7;
    --danger: #8b2020; --danger-light: #fdf0f0;
    --radius: 10px; --radius-lg: 16px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.25rem; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Lora', serif; color: white; font-size: 15px; font-weight: 600; }
  .logo-text { font-family: 'Lora', serif; font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .header-stats { display: flex; gap: 14px; }
  .hstat { text-align: center; }
  .hstat-num { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1; }
  .hstat-label { font-size: 10px; color: var(--text3); margin-top: 2px; }

  main { max-width: 860px; margin: 0 auto; padding: 1.25rem; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .search-wrap { flex: 1; position: relative; min-width: 0; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--text3); pointer-events: none; }
  .search-input { width: 100%; padding: 9px 12px 9px 34px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; transition: border-color 0.15s; }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .btn { padding: 9px 16px; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--surface2); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled) { background: #245030; border-color: #245030; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-danger { color: var(--danger); border-color: #e8c0c0; }
  .btn-danger:hover { background: var(--danger-light); }

  .tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab { padding: 6px 13px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text2); transition: all 0.15s; }
  .tab:hover { border-color: #c0bab2; }
  .tab.active-all { background: var(--text); color: white; border-color: var(--text); }
  .tab.active-pt { background: var(--accent); color: white; border-color: var(--accent); }
  .tab.active-en-word { background: var(--blue); color: white; border-color: var(--blue); }
  .tab.active-en-expr { background: var(--purple); color: white; border-color: var(--purple); }

  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.25rem; animation: slideDown 0.2s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .form-card h3 { font-family: 'Lora', serif; font-size: 16px; font-weight: 600; margin-bottom: 1rem; }

  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group label { font-size: 11px; font-weight: 500; color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--surface); transition: border-color 0.15s; width: 100%; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 68px; line-height: 1.5; }
  .form-group input.error, .form-group textarea.error { border-color: var(--danger); }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

  .entries { display: flex; flex-direction: column; gap: 10px; }
  .entry-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; transition: box-shadow 0.15s, border-color 0.15s; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .entry-card:hover { border-color: #c8c2b8; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .entry-term { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-pt { background: var(--accent-light); color: var(--accent); }
  .badge-en-word { background: var(--blue-light); color: var(--blue); }
  .badge-en-expr { background: var(--purple-light); color: var(--purple); }
  .entry-meaning { font-size: 14px; color: var(--text2); margin-top: 7px; line-height: 1.65; }
  .entry-example { font-family: 'Lora', serif; font-style: italic; font-size: 13px; color: var(--text3); margin-top: 8px; line-height: 1.6; padding-left: 11px; border-left: 2px solid var(--border); }
  .entry-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 8px; }
  .entry-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 11px; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; }
  .entry-actions { display: flex; gap: 6px; }

  .empty { text-align: center; padding: 4rem 1rem; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); z-index: 999; background: var(--text); color: white; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--accent); }

  .loading { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }
  .spinner { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 520px) {
    .header-stats { gap: 10px; }
    .hstat-label { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">D</div>
      <span class="logo-text">Meu Dicionário</span>
    </div>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num" id="statTotal">—</div><div class="hstat-label">total</div></div>
      <div class="hstat"><div class="hstat-num" id="statPt">—</div><div class="hstat-label">expr. PT</div></div>
      <div class="hstat"><div class="hstat-num" id="statEnWord">—</div><div class="hstat-label">palavras EN</div></div>
      <div class="hstat"><div class="hstat-num" id="statEnExpr">—</div><div class="hstat-label">expr. EN</div></div>
    </div>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar palavra ou expressão..." oninput="renderEntries()" />
    </div>
    <button class="btn btn-primary" onclick="toggleForm()">+ Adicionar</button>
  </div>

  <div class="tabs">
    <button class="tab active-all" id="tab-all" onclick="setTab('all')">Tudo</button>
    <button class="tab" id="tab-pt-expr" onclick="setTab('pt-expr')">Expressões PT</button>
    <button class="tab" id="tab-en-word" onclick="setTab('en-word')">Palavras EN</button>
    <button class="tab" id="tab-en-expr" onclick="setTab('en-expr')">Expressões EN</button>
  </div>

  <div id="formWrap" style="display:none;">
    <div class="form-card">
      <h3 id="formTitle">Nova entrada</h3>
      <div class="form-group">
        <label>Termo / Expressão *</label>
        <input type="text" id="fTerm" placeholder="Ex: dar o fora, to bite the bullet" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Categoria *</label>
          <select id="fType">
            <option value="pt-expr">Expressão em Português</option>
            <option value="en-word">Palavra em Inglês</option>
            <option value="en-expr">Expressão em Inglês</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tags (separadas por vírgula)</label>
          <input type="text" id="fTags" placeholder="Ex: informal, trabalho" />
        </div>
      </div>
      <div class="form-group">
        <label>Significado / Definição *</label>
        <textarea id="fMeaning" placeholder="O que significa? Em que contexto se usa?"></textarea>
      </div>
      <div class="form-group">
        <label>Exemplo de uso (opcional)</label>
        <textarea id="fExample" placeholder="Uma frase de exemplo..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn" onclick="cancelForm()">Cancelar</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveEntry()">Salvar entrada</button>
      </div>
    </div>
  </div>

  <div id="entriesList"></div>
</main>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://gmahgohxzxqlofiwmtuv.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_2CIkZtHrDGG0aoreHK4jKQ_jlv2CGle';

  let allEntries = [];
  let currentTab = 'all';
  let editingId = null;

  async function api(method, path, body) {
    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    };
    if (method === 'POST' || method === 'PATCH') {
      headers['Prefer'] = 'return=representation';
    }
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      method: method,
      headers: headers,
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) {
      const err = await res.text();
      console.error('Supabase error:', res.status, err);
      throw new Error('Status ' + res.status + ': ' + err);
    }
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadEntries() {
    showLoading();
    try {
      const data = await api('GET', 'entries?order=created_at.desc&select=*');
      allEntries = data || [];
      updateStats();
      renderEntries();
    } catch (e) {
      showToast('Erro ao carregar. Verifique a conexão.', 'error');
      document.getElementById('entriesList').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Não foi possível conectar ao banco de dados.</p></div>';
    }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allEntries.length;
    document.getElementById('statPt').textContent = allEntries.filter(e => e.type === 'pt-expr').length;
    document.getElementById('statEnWord').textContent = allEntries.filter(e => e.type === 'en-word').length;
    document.getElementById('statEnExpr').textContent = allEntries.filter(e => e.type === 'en-expr').length;
  }

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
    document.getElementById('tab-' + tab).className = 'tab active-' + tab;
    renderEntries();
  }

  function renderEntries() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    let list = allEntries;
    if (currentTab !== 'all') list = list.filter(e => e.type === currentTab);
    if (search) list = list.filter(e =>
      e.term.toLowerCase().includes(search) ||
      e.meaning.toLowerCase().includes(search) ||
      (e.example || '').toLowerCase().includes(search) ||
      (e.tags || []).some(t => t.toLowerCase().includes(search))
    );
    const el = document.getElementById('entriesList');
    if (list.length === 0) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📖</div><p>' + (search || currentTab !== 'all' ? 'Nenhuma entrada encontrada.' : 'Seu dicionário está vazio. Adicione a primeira entrada!') + '</p></div>';
      return;
    }
    el.innerHTML = list.map(e => {
      const bc = e.type === 'pt-expr' ? 'badge-pt' : e.type === 'en-word' ? 'badge-en-word' : 'badge-en-expr';
      const bl = e.type === 'pt-expr' ? 'Expressão PT' : e.type === 'en-word' ? 'Palavra EN' : 'Expressão EN';
      const tags = (e.tags || []).map(t => '<span class="tag">' + t + '</span>').join('');
      const example = e.example ? '<div class="entry-example">"' + e.example + '"</div>' : '';
      return '<div class="entry-card"><div class="entry-top"><div class="entry-term">' + e.term + '</div><span class="badge ' + bc + '">' + bl + '</span></div><div class="entry-meaning">' + e.meaning + '</div>' + example + '<div class="entry-footer"><div class="entry-tags">' + tags + '</div><div class="entry-actions"><button class="btn btn-sm" onclick="editEntry(\'' + e.id + '\')">Editar</button><button class="btn btn-sm btn-danger" onclick="deleteEntry(\'' + e.id + '\')">Remover</button></div></div></div>';
    }).join('');
  }

  function showLoading() {
    document.getElementById('entriesList').innerHTML = '<div class="loading"><div class="spinner"></div>Carregando...</div>';
  }

  function toggleForm() {
    const wrap = document.getElementById('formWrap');
    if (wrap.style.display === 'none') {
      wrap.style.display = 'block';
      editingId = null;
      document.getElementById('formTitle').textContent = 'Nova entrada';
      document.getElementById('fTerm').value = '';
      document.getElementById('fType').value = 'pt-expr';
      document.getElementById('fMeaning').value = '';
      document.getElementById('fExample').value = '';
      document.getElementById('fTags').value = '';
      document.getElementById('saveBtn').textContent = 'Salvar entrada';
      document.getElementById('fTerm').classList.remove('error');
      document.getElementById('fMeaning').classList.remove('error');
      document.getElementById('fTerm').focus();
      wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
      cancelForm();
    }
  }

  function cancelForm() {
    document.getElementById('formWrap').style.display = 'none';
    editingId = null;
  }

  function editEntry(id) {
    const e = allEntries.find(x => x.id === id);
    if (!e) return;
    editingId = id;
    document.getElementById('formWrap').style.display = 'block';
    document.getElementById('formTitle').textContent = 'Editar entrada';
    document.getElementById('fTerm').value = e.term;
    document.getElementById('fType').value = e.type;
    document.getElementById('fMeaning').value = e.meaning;
    document.getElementById('fExample').value = e.example || '';
    document.getElementById('fTags').value = (e.tags || []).join(', ');
    document.getElementById('saveBtn').textContent = 'Salvar alterações';
    document.getElementById('formWrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function saveEntry() {
    const term = document.getElementById('fTerm').value.trim();
    const type = document.getElementById('fType').value;
    const meaning = document.getElementById('fMeaning').value.trim();
    const example = document.getElementById('fExample').value.trim();
    const tagsRaw = document.getElementById('fTags').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

    document.getElementById('fTerm').classList.toggle('error', !term);
    document.getElementById('fMeaning').classList.toggle('error', !meaning);
    if (!term || !meaning) { showToast('Preencha os campos obrigatórios.', 'error'); return; }

    const btn = document.getElementById('saveBtn');
    const originalText = btn.textContent;
    btn.textContent = 'Salvando...';
    btn.disabled = true;

    try {
      const payload = { term, type, meaning, example: example || null, tags };
      if (editingId) {
        const updated = await api('PATCH', 'entries?id=eq.' + editingId, payload);
        const idx = allEntries.findIndex(e => e.id === editingId);
        if (idx !== -1 && updated && updated[0]) allEntries[idx] = updated[0];
        showToast('Entrada atualizada!', 'success');
      } else {
        const created = await api('POST', 'entries', payload);
        if (created && created[0]) allEntries.unshift(created[0]);
        showToast('Entrada adicionada!', 'success');
      }
      cancelForm();
      updateStats();
      renderEntries();
    } catch (e) {
      console.error(e);
      showToast('Erro ao salvar: ' + e.message, 'error');
      btn.textContent = originalText;
      btn.disabled = false;
    }
  }

  async function deleteEntry(id) {
    if (!confirm('Remover esta entrada?')) return;
    try {
      await api('DELETE', 'entries?id=eq.' + id);
      allEntries = allEntries.filter(e => e.id !== id);
      updateStats();
      renderEntries();
      showToast('Entrada removida.', 'success');
    } catch (e) {
      showToast('Erro ao remover.', 'error');
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  loadEntries();
</script>
</body>
</html>
